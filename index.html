<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --indigo:#141C3A; --paper:#F3EEE3; --ink:#20242E;
    --vermilion:#CE3F2E; --matcha:#7C8A56; --gold:#C39A2B; --muted:#8C93A8;
  }
  *{box-sizing:border-box}
  body{margin:0}
  #app{background:var(--indigo);color:var(--paper);font-family:"Helvetica Neue",Inter,system-ui,sans-serif;
    min-height:100vh;padding:22px 18px 70px;
    background-image:radial-gradient(circle at 12% -10%,rgba(206,63,46,.18),transparent 55%),
                     radial-gradient(circle at 95% 5%,rgba(124,138,86,.14),transparent 45%);}
  .wrap{max-width:1060px;margin:0 auto}
  h1{font-family:Georgia,serif;font-weight:400;letter-spacing:.2em;text-transform:uppercase;
     font-size:clamp(19px,3.2vw,28px);margin:0 0 4px}
  h2{font-family:Georgia,serif;font-weight:400;font-size:21px;margin:0 0 10px}
  .sub{color:var(--muted);font-size:12.5px;letter-spacing:.06em;margin-bottom:20px}
  .row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  button{font:inherit;font-size:13px;letter-spacing:.05em;cursor:pointer;background:transparent;
    color:var(--paper);border:1px solid rgba(243,238,227,.28);border-radius:2px;padding:9px 14px;
    transition:background .15s,border-color .15s}
  button:hover{background:rgba(243,238,227,.09);border-color:rgba(243,238,227,.6)}
  button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  button.primary{background:var(--vermilion);border-color:var(--vermilion);color:#fff}
  button.primary:hover{background:#b93727}
  button.on{background:var(--paper);color:var(--indigo);border-color:var(--paper)}
  button[disabled]{opacity:.4;cursor:default}
  input,textarea,select{font:inherit;font-size:14px;background:rgba(0,0,0,.22);color:var(--paper);
    border:1px solid rgba(243,238,227,.22);border-radius:2px;padding:9px 11px;width:100%}
  textarea{min-height:64px;line-height:1.45;resize:vertical}
  label{display:block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:12px 0 5px}
  .tabs{display:flex;gap:24px;border-bottom:1px solid rgba(243,238,227,.16);margin-bottom:20px;flex-wrap:wrap}
  .tab{padding:0 0 10px;border:0;border-bottom:2px solid transparent;border-radius:0;letter-spacing:.14em;
       text-transform:uppercase;font-size:10.5px;color:var(--muted);background:none}
  .tab:hover{background:none;color:var(--paper)}
  .tab.active{color:var(--paper);border-bottom-color:var(--vermilion)}
  .panel{background:rgba(0,0,0,.2);border:1px solid rgba(243,238,227,.12);border-radius:3px;padding:18px;margin-bottom:14px}
  .note{font-size:12px;color:var(--muted);line-height:1.6}
  .meta{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}

  /* stele */
  .pref{border-bottom:1px solid rgba(243,238,227,.1);padding:14px 0}
  .pref .q{font-size:15px;line-height:1.4;margin-bottom:9px}
  .stars{display:flex;gap:3px;flex-wrap:wrap}
  .st{width:27px;height:30px;border:0;background:none;padding:0;font-size:19px;line-height:1;color:rgba(243,238,227,.22)}
  .st:hover{background:none}
  .st.fill{color:var(--gold)}
  .scoretag{font-size:12px;color:var(--muted);margin-left:8px}

  /* dueluri */
  .duel{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--paper);color:var(--ink);border-radius:3px;overflow:hidden;text-align:left;padding:0;
    border:0;position:relative;display:flex;flex-direction:column;box-shadow:0 12px 30px rgba(0,0,0,.35);transition:transform .18s}
  .card:hover{background:var(--paper);transform:translateY(-3px)}
  .thumb{height:160px;display:flex;align-items:center;justify-content:center;font-size:52px;background-size:cover;background-position:center}
  .card .body{padding:14px 16px 18px}
  .card h3{margin:0 0 4px;font-family:Georgia,serif;font-weight:400;font-size:19px;line-height:1.25}
  .desc{font-size:13.5px;line-height:1.5;margin:0 0 8px}
  .why{font-size:12.5px;line-height:1.5;color:#4c5262;border-left:2px solid var(--vermilion);padding-left:9px}
  .stamp{position:absolute;top:10px;right:10px;width:56px;height:56px;border:2.5px solid var(--vermilion);
    border-radius:50%;color:var(--vermilion);font-family:Georgia,serif;font-size:12px;display:flex;align-items:center;
    justify-content:center;transform:rotate(-14deg) scale(0);opacity:0;background:rgba(255,255,255,.6)}
  .stamp.show{animation:stamp .45s ease-out forwards}
  @keyframes stamp{0%{transform:rotate(-40deg) scale(2);opacity:0}60%{opacity:1}100%{transform:rotate(-14deg) scale(1);opacity:1}}
  @media (prefers-reduced-motion:reduce){.stamp.show{animation:none;transform:rotate(-14deg) scale(1);opacity:1}.card:hover{transform:none}}
  .vs{text-align:center;font-family:Georgia,serif;letter-spacing:.28em;color:var(--muted);margin:14px 0 12px;font-size:11.5px}
  @media(max-width:640px){.duel{grid-template-columns:1fr}.thumb{height:120px;font-size:40px}}

  /* alegeri */
  .opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
  .opt{background:rgba(243,238,227,.06);border:1px solid rgba(243,238,227,.16);border-radius:3px;
       padding:14px;text-align:left;display:block}
  .opt.sel{border-color:var(--vermilion);background:rgba(206,63,46,.16)}
  .opt b{display:block;font-family:Georgia,serif;font-weight:400;font-size:16px;margin-bottom:5px}
  .opt span{display:block;font-size:12.5px;line-height:1.45;color:#cfd4e0}
  .opt em{display:block;font-style:normal;font-size:11.5px;margin-top:6px;color:var(--gold)}

  /* liste */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .mini{background:rgba(243,238,227,.06);border:1px solid rgba(243,238,227,.14);border-radius:3px;padding:12px 13px}
  .mini h4{margin:0 0 4px;font-family:Georgia,serif;font-weight:400;font-size:16px}
  .mini p{margin:0;font-size:12.5px;line-height:1.45;color:#c8ccd8}
  .rank{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(243,238,227,.1)}
  .num{font-family:Georgia,serif;font-size:20px;color:var(--gold);min-width:32px}
  .bar{height:5px;background:rgba(243,238,227,.12);border-radius:3px;overflow:hidden;margin-top:5px}
  .bar i{display:block;height:100%;background:var(--vermilion)}
  .small{font-size:11.5px;color:var(--muted)}
  .pill{display:inline-block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(243,238,227,.25);
        border-radius:99px;padding:3px 9px;margin:0 6px 6px 0;color:#cfd4e0}
  .ed{border:1px dashed rgba(243,238,227,.25);border-radius:3px;padding:14px;margin-bottom:10px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:640px){.two{grid-template-columns:1fr}}
</style>

/* ==================== SFÂRȘITUL ZONEI DE EDITAT ==================== */

const $=s=>document.querySelector(s);
const K=32,BASE=1500;
let S={me:"",etapa:"pref",oras:"Tokyo",tab:"pref",pair:null,err:"",loading:true,
       date:{prefs:{},dueluri:[],alegeri:{}},toti:{},organizator:false,edit:null};

/* ---------- stocare ---------- */
async function get(k){try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null}catch(e){return null}}
async function set(k,v){try{await window.storage.set(k,JSON.stringify(v),true);return true}catch(e){S.err="Nu am putut salva.";return false}}
async function load(){
  const c=await get("jp:continut");
  if(c){ if(c.PREFERINTE)PREFERINTE=c.PREFERINTE; if(c.CARDURI)CARDURI=c.CARDURI; if(c.ALEGERI)ALEGERI=c.ALEGERI; }
  try{
    const l=await window.storage.list("jp:r:",true);
    for(const k of (l?.keys||[])){const v=await get(k); if(v) S.toti[k.replace("jp:r:","")]=v;}
  }catch(e){}
  S.loading=false;render();
}
const salveazaContinut=()=>set("jp:continut",{PREFERINTE,CARDURI,ALEGERI});
async function salveaza(){S.toti[S.me]=S.date;await set("jp:r:"+S.me,S.date);}

/* ---------- elo ---------- */
function elo(dueluri,oras){
  const ids=CARDURI.filter(c=>c.oras===oras).map(c=>c.id);
  const r={},n={};ids.forEach(i=>{r[i]=BASE;n[i]=0});
  (dueluri||[]).filter(d=>d.o===oras).forEach(d=>{
    if(r[d.w]===undefined||r[d.l]===undefined)return;
    const e=1/(1+Math.pow(10,(r[d.l]-r[d.w])/400));
    r[d.w]+=K*(1-e);r[d.l]-=K*(1-e);n[d.w]++;n[d.l]++;
  });
  return{r,n,ids};
}
function urmatoareaPereche(oras){
  const{r,n,ids}=elo(S.date.dueluri,oras);
  if(ids.length<2)return null;
  const vazute=new Set((S.date.dueluri||[]).filter(d=>d.o===oras).map(d=>[d.w,d.l].sort().join("|")));
  const tinta=Math.max(4,Math.ceil(Math.log2(ids.length))+2);
  const pool=ids.filter(i=>n[i]<tinta);
  if(!pool.length)return null;
  const a=pool.sort((x,y)=>n[x]-n[y]||Math.random()-.5)[0];
  const c=ids.filter(i=>i!==a&&!vazute.has([a,i].sort().join("|")));
  if(!c.length)return null;
  c.sort((x,y)=>Math.abs(r[x]-r[a])-Math.abs(r[y]-r[a]));
  const b=c[Math.floor(Math.random()*Math.min(3,c.length))];
  return Math.random()<.5?[a,b]:[b,a];
}
const card=id=>CARDURI.find(c=>c.id===id);
const esc=s=>(s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const fundal=c=>c.img?`style="background-image:url('${esc(c.img)}')"`:`style="background:linear-gradient(150deg,#2A3766,#48345C)"`;

/* ---------- randare ---------- */
function render(){
  const root=$("#root");
  if(S.loading){root.innerHTML=`<h1>Japonia · Planificarea călătoriei</h1><p class="sub">Se încarcă…</p>`;return;}
  if(!S.me){
    root.innerHTML=`<h1>Japonia · Planificarea călătoriei</h1>
    <p class="sub">Trei etape: preferințe generale, dueluri pe orașe, alegeri organizatorice.</p>
    <div class="panel" style="max-width:440px">
      <label for="nm">Numele tău</label><input id="nm" placeholder="ex. Ana" autofocus>
      <div class="row" style="margin-top:14px"><button class="primary" id="go">Începe</button>
      <button id="org">Sunt organizatorul</button></div>
      <p class="note" style="margin-top:14px">Fiecare participant deschide același link și își scrie numele. Răspunsurile se adună automat.</p>
    </div>`;
    $("#go").onclick=()=>{const v=$("#nm").value.trim();if(!v)return;S.me=v;S.date=S.toti[v]||{prefs:{},dueluri:[],alegeri:{}};render()};
    $("#nm").onkeydown=e=>{if(e.key==="Enter")$("#go").click()};
    $("#org").onclick=()=>{S.me="Organizator";S.organizator=true;S.tab="ed";S.date=S.toti["Organizator"]||{prefs:{},dueluri:[],alegeri:{}};render()};
    return;
  }
  const taburi=[["pref","1 · Preferințe"],["duel","2 · Dueluri"],["aleg","3 · Alegeri"],["rez","Rezultate"],["ed","Mod organizator"]];
  root.innerHTML=`<h1>Japonia · Planificator de grup</h1>
   <p class="sub">${esc(S.me)} · ${Object.keys(S.date.prefs).length}/${PREFERINTE.length} preferințe · ${S.date.dueluri.length} dueluri · ${Object.keys(S.date.alegeri).length}/${ALEGERI.length} alegeri${S.err?` · <span style="color:var(--vermilion)">${esc(S.err)}</span>`:""}</p>
   <div class="tabs">${taburi.map(t=>`<button class="tab ${S.tab===t[0]?"active":""}" data-t="${t[0]}">${t[1]}</button>`).join("")}</div>
   <div id="view"></div>`;
  root.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;S.pair=null;render()});
  ({pref:vPref,duel:vDuel,aleg:vAleg,rez:vRez,ed:vEd})[S.tab]();
}
function baraOrase(){
  return `<div class="row" style="margin-bottom:14px">${ORASE.map(o=>`<button class="${S.oras===o?"on":""}" data-o="${o}">${o}</button>`).join("")}</div>`;
}
function legOrase(){document.querySelectorAll("[data-o]").forEach(b=>b.onclick=()=>{S.oras=b.dataset.o;S.pair=null;render()})}

function vPref(){
  const v=$("#view");
  v.innerHTML=`<div class="panel"><h2>Cum arată vacanța ta ideală?</h2>
  <p class="note" style="margin-bottom:6px">Notează fiecare afirmație de la 1 (deloc) la 10 (neapărat). Nu există răspuns greșit — scopul e să vedem unde grupul e de acord și unde nu.</p></div>
  ${PREFERINTE.map(p=>{const val=S.date.prefs[p.id]||0;
    return `<div class="pref"><div class="q">${esc(p.text)}</div>
    <div class="stars" data-p="${p.id}">${Array.from({length:10},(_,i)=>
      `<button class="st ${i<val?"fill":""}" data-v="${i+1}" aria-label="${i+1} din 10">★</button>`).join("")}
      <span class="scoretag">${val?val+" / 10":"nenotat"}</span></div></div>`}).join("")}`;
  v.querySelectorAll(".stars").forEach(g=>g.querySelectorAll(".st").forEach(b=>b.onclick=async()=>{
    S.date.prefs[g.dataset.p]=+b.dataset.v;await salveaza();vPref();
  }));
}

function vDuel(){
  if(!S.pair)S.pair=urmatoareaPereche(S.oras);
  const v=$("#view");
  if(!S.pair){
    v.innerHTML=baraOrase()+`<div class="panel"><h2>${esc(S.oras)} — gata.</h2>
      <p class="note">Ai comparat destule perechi pentru un clasament stabil. Treci la alt oraș, sau vezi <b>Rezultate</b>.</p></div>`;
    legOrase();return;
  }
  const[a,b]=S.pair.map(card);
  const unul=(c,alt)=>`<button class="card" data-w="${c.id}" data-l="${alt.id}">
    <div class="thumb" ${fundal(c)}>${c.img?"":c.emoji}</div>
    <div class="body"><div class="meta">${esc(c.oras)}</div><h3>${esc(c.titlu)}</h3>
      <p class="desc">${esc(c.desc)}</p><p class="why">${esc(c.dece)}</p></div>
    <div class="stamp">選</div></button>`;
  v.innerHTML=baraOrase()+`<p class="vs">CE AI PREFERA SĂ FACEM?</p>
    <div class="duel">${unul(a,b)}${unul(b,a)}</div>
    <div class="row" style="margin-top:16px;justify-content:center">
      <button id="skip">N-am preferință — sari</button>
      <button id="undo" ${S.date.dueluri.length?"":"disabled"}>Anulează ultima</button></div>`;
  legOrase();
  v.querySelectorAll(".card").forEach(el=>el.onclick=async()=>{
    el.querySelector(".stamp").classList.add("show");
    S.date.dueluri.push({w:el.dataset.w,l:el.dataset.l,o:S.oras,t:Date.now()});
    await salveaza();
    setTimeout(()=>{S.pair=urmatoareaPereche(S.oras);render()},380);
  });
  $("#skip").onclick=()=>{S.pair=urmatoareaPereche(S.oras);render()};
  $("#undo").onclick=async()=>{S.date.dueluri.pop();await salveaza();S.pair=urmatoareaPereche(S.oras);render()};
}

function vAleg(){
  const v=$("#view");
  v.innerHTML=`<div class="panel"><h2>Cum vrei să fie organizată vacanța?</h2>
  <p class="note">Aici nu clasificăm — alegem. O singură variantă la fiecare întrebare.</p></div>`+
  ALEGERI.map(q=>`<div class="panel"><div class="meta">${esc(q.context||"organizare")}</div>
    <h2 style="font-size:18px">${esc(q.intrebare)}</h2>
    <div class="opts" data-q="${q.id}">${q.optiuni.map((o,i)=>
      `<button class="opt ${S.date.alegeri[q.id]===i?"sel":""}" data-i="${i}">
        <b>${esc(o.titlu)}</b><span>${esc(o.desc)}</span><em>${esc(o.nota)}</em></button>`).join("")}</div></div>`).join("");
  v.querySelectorAll(".opts").forEach(g=>g.querySelectorAll(".opt").forEach(b=>b.onclick=async()=>{
    S.date.alegeri[g.dataset.q]=+b.dataset.i;await salveaza();vAleg();
  }));
}

function vRez(){
  const oameni=Object.keys(S.toti).length?Object.keys(S.toti):[S.me];
  const v=$("#view");
  /* preferinte medii */
  const medii=PREFERINTE.map(p=>{
    const note=oameni.map(o=>S.toti[o]?.prefs?.[p.id]).filter(x=>x>0);
    const m=note.length?note.reduce((a,b)=>a+b,0)/note.length:0;
    const sd=note.length>1?Math.sqrt(note.reduce((s,x)=>s+(x-m)**2,0)/note.length):0;
    return{p,m,sd,n:note.length};
  }).sort((a,b)=>b.m-a.m);
  /* clasament oras */
  const ids=CARDURI.filter(c=>c.oras===S.oras).map(c=>c.id);
  const sum={},sp={};ids.forEach(i=>{sum[i]=0;sp[i]=[]});
  oameni.forEach(o=>{const{r}=elo(S.toti[o]?.dueluri||[],S.oras);ids.forEach(i=>{sum[i]+=r[i];sp[i].push(r[i])})});
  const ord=ids.slice().sort((a,b)=>sum[b]-sum[a]);
  const dev=i=>{const m=sum[i]/oameni.length;return Math.sqrt(sp[i].reduce((s,x)=>s+(x-m)**2,0)/sp[i].length)};
  const maxd=Math.max(1,...ids.map(dev));

  v.innerHTML=`<div class="panel"><div class="meta">Preferințe generale — media grupului (${oameni.length} persoane)</div>
    ${medii.map(x=>`<div class="rank"><span class="num">${x.m?x.m.toFixed(1):"–"}</span>
      <div style="flex:1"><div style="font-size:14px">${esc(x.p.text)}</div>
      <div class="bar"><i style="width:${x.m*10}%"></i></div></div>
      <span class="small">${x.sd>2.5?"⚡ păreri împărțite":x.sd<1.2?"✓ consens":"~ mixt"}</span></div>`).join("")}</div>`
  + baraOrase() +
  `<div class="panel"><div class="meta">Clasamentul grupului — ${esc(S.oras)}</div>
    ${ord.map((id,i)=>{const c=card(id);const d=dev(id);
      return `<div class="rank"><span class="num">${String(i+1).padStart(2,"0")}</span>
      <div style="flex:1"><div>${c.img?"":c.emoji} ${esc(c.titlu)}</div>
      <div class="small">${d>maxd*.6?"⚡ păreri împărțite":d<maxd*.25?"✓ consens":"~ mixt"}</div></div></div>`}).join("")}</div>
  <div class="panel"><div class="meta">Alegeri organizatorice</div>
    ${ALEGERI.map(q=>{const nr=q.optiuni.map((_,i)=>oameni.filter(o=>S.toti[o]?.alegeri?.[q.id]===i).length);
      const tot=nr.reduce((a,b)=>a+b,0)||1;
      return `<div style="padding:10px 0;border-bottom:1px solid rgba(243,238,227,.1)">
        <div style="font-size:14px;margin-bottom:6px">${esc(q.intrebare)}</div>
        ${q.optiuni.map((o,i)=>`<div class="row" style="gap:8px;margin-bottom:4px">
          <span class="small" style="min-width:190px">${esc(o.titlu)}</span>
          <div class="bar" style="flex:1;margin:0"><i style="width:${nr[i]/tot*100}%"></i></div>
          <span class="small">${nr[i]}</span></div>`).join("")}</div>`}).join("")}</div>
  <div class="panel"><div class="meta">Cine a răspuns</div>
    ${oameni.map(o=>`<span class="pill">${esc(o)}</span>`).join("")}
    <p class="note" style="margin-top:8px">Reîncarcă pagina ca să vezi răspunsurile trimise între timp.</p></div>`;
  legOrase();
}

/* ---------- mod organizator ---------- */
function vEd(){
  const v=$("#view");
  v.innerHTML=`<div class="panel"><h2>Mod organizator</h2>
    <p class="note">Aici construiești conținutul. Modificările se salvează pentru toată lumea. Exportă JSON-ul ca backup sau ca să-l lipești direct în fișier.</p>
    <div class="row" style="margin-top:12px">
      <button id="exp">Exportă JSON</button><button id="imp">Importă JSON</button>
      <button id="nou" class="primary">Card nou în ${esc(S.oras)}</button></div></div>`
  + baraOrase() +
  CARDURI.filter(c=>c.oras===S.oras).map(c=>`<div class="ed" data-id="${c.id}">
      <div class="two">
        <div><label>Titlu</label><input data-f="titlu" value="${esc(c.titlu)}"></div>
        <div><label>Oraș</label><select data-f="oras">${ORASE.map(o=>`<option ${o===c.oras?"selected":""}>${o}</option>`).join("")}</select></div>
      </div>
      <div class="two">
        <div><label>Emoji (dacă nu ai poză)</label><input data-f="emoji" value="${esc(c.emoji)}"></div>
        <div><label>Link fotografie</label><input data-f="img" value="${esc(c.img)}" placeholder="https://…"></div>
      </div>
      <label>Ce este — o frază clară</label><textarea data-f="desc">${esc(c.desc)}</textarea>
      <label>De ce merită — argumentul sincer, cu tot cu capcană</label><textarea data-f="dece">${esc(c.dece)}</textarea>
      <div class="row" style="margin-top:10px"><button class="primary" data-act="save">Salvează</button>
      <button data-act="del">Șterge</button>
      ${c.img?`<img src="${esc(c.img)}" style="height:46px;border-radius:2px">`:""}</div>
    </div>`).join("");
  legOrase();
  v.querySelectorAll(".ed").forEach(box=>{
    const c=card(box.dataset.id);
    box.querySelector('[data-act="save"]').onclick=async()=>{
      box.querySelectorAll("[data-f]").forEach(f=>c[f.dataset.f]=f.value.trim());
      await salveazaContinut();render();
    };
    box.querySelector('[data-act="del"]').onclick=async()=>{
      if(!confirm("Ștergi cardul „"+c.titlu+"”?"))return;
      CARDURI=CARDURI.filter(x=>x.id!==c.id);await salveazaContinut();render();
    };
  });
  $("#nou").onclick=async()=>{
    CARDURI.push({id:"n"+Date.now(),oras:S.oras,titlu:"Titlu nou",emoji:"📍",img:"",desc:"",dece:""});
    await salveazaContinut();render();
  };
  $("#exp").onclick=()=>{
    const b=new Blob([JSON.stringify({PREFERINTE,CARDURI,ALEGERI},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="japonia-continut.json";a.click();
  };
  $("#imp").onclick=()=>{
    const i=document.createElement("input");i.type="file";i.accept=".json";
    i.onchange=async()=>{const t=await i.files[0].text();
      try{const d=JSON.parse(t);if(d.PREFERINTE)PREFERINTE=d.PREFERINTE;if(d.CARDURI)CARDURI=d.CARDURI;if(d.ALEGERI)ALEGERI=d.ALEGERI;
        await salveazaContinut();render();}catch(e){alert("Fișier invalid.")}};
    i.click();
  };
}
load();
</script>
