<!DOCTYPE html>
<meta charset="utf-8">
<title>日本の秋 · Planificator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --hartie:#F5EFE4; --hartie2:#FFFCF6; --tus:#33302B; --gri:#8A8377;
    --artar:#C4452D; --kaki:#B07C2A; --ceai:#6E7A52; --indigo:#4A6274;
    --linie:#E2D8C6; --linie2:#EFE7D9;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--hartie)}
  #app{color:var(--tus);font-family:"Helvetica Neue",Inter,system-ui,sans-serif;min-height:100vh;
       padding:26px 18px 90px;
       background-image:radial-gradient(circle at 90% 0%,rgba(196,69,45,.07),transparent 45%),
                        radial-gradient(circle at 5% 12%,rgba(110,122,82,.07),transparent 40%),
                        radial-gradient(circle at 40% 100%,rgba(176,124,42,.05),transparent 50%)}
  .wrap{max-width:1100px;margin:0 auto}

  .kanji{font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;font-size:clamp(30px,6vw,46px);
         color:var(--artar);letter-spacing:.08em;margin:0;line-height:1.1}
  .kanji small{font-size:.42em;letter-spacing:.04em}
  h1{font-family:Georgia,serif;font-weight:400;font-size:clamp(15px,2.4vw,19px);letter-spacing:.2em;
     text-transform:uppercase;margin:8px 0 2px;color:var(--tus)}
  h2{font-family:Georgia,serif;font-weight:400;font-size:21px;margin:0 0 10px}
  .sub{color:var(--gri);font-size:12.5px;letter-spacing:.05em;margin:0 0 22px}
  .row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}

  button{font:inherit;font-size:13px;letter-spacing:.04em;cursor:pointer;background:var(--hartie2);
    color:var(--tus);border:1px solid var(--linie);border-radius:2px;padding:9px 14px;
    transition:background .15s,border-color .15s,transform .15s,color .15s}
  button:hover{border-color:var(--artar)}
  button:focus-visible{outline:2px solid var(--kaki);outline-offset:2px}
  button.primary{background:var(--artar);border-color:var(--artar);color:#fff}
  button.primary:hover{background:#a83722}
  button.on{background:var(--tus);color:var(--hartie);border-color:var(--tus)}
  button[disabled]{opacity:.4;cursor:default}
  input,textarea,select{font:inherit;font-size:14px;background:var(--hartie2);color:var(--tus);
    border:1px solid var(--linie);border-radius:2px;padding:9px 11px;width:100%}
  textarea{min-height:64px;line-height:1.45;resize:vertical}
  label{display:block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gri);margin:12px 0 5px}

  .tabs{display:flex;gap:22px;border-bottom:1px solid var(--linie);margin-bottom:20px;flex-wrap:wrap}
  .tab{padding:0 0 10px;border:0;border-bottom:2px solid transparent;border-radius:0;letter-spacing:.13em;
       text-transform:uppercase;font-size:10.5px;color:var(--gri);background:none}
  .tab:hover{background:none;color:var(--tus)}
  .tab.active{color:var(--artar);border-bottom-color:var(--artar)}

  .panel{background:var(--hartie2);border:1px solid var(--linie);border-radius:3px;padding:18px;margin-bottom:14px}
  .note{font-size:12.5px;color:var(--gri);line-height:1.65}
  .meta{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gri);margin-bottom:8px}
  .hr{height:1px;background:var(--linie);margin:16px 0}

  /* ---------- interese (1-10) ---------- */
  .pref{border-bottom:1px solid var(--linie);padding:14px 2px}
  .pref:last-child{border-bottom:0}
  .pref .q{font-size:15px;line-height:1.45;margin-bottom:9px}
  .stars{display:flex;gap:2px;flex-wrap:wrap;align-items:center}
  .st{width:28px;height:30px;border:0;background:none;padding:0;font-size:19px;line-height:1;color:#DCD2C0}
  .st:hover{background:none;border:0;transform:translateY(-2px)}
  .st.fill{color:var(--artar)}
  .scoretag{font-size:12px;color:var(--gri);margin-left:8px}

  /* ---------- carduri ---------- */
  .duel{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grila{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .card{background:var(--hartie2);color:var(--tus);border-radius:3px;overflow:hidden;text-align:left;padding:0;
    border:1px solid var(--linie);position:relative;display:flex;flex-direction:column;width:100%;
    box-shadow:0 8px 22px rgba(80,60,40,.09);transition:transform .18s,box-shadow .18s,border-color .18s}
  .card.pick{cursor:pointer}
  .card.pick:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(80,60,40,.16);border-color:var(--artar)}
  .card.static{box-shadow:0 4px 14px rgba(80,60,40,.07)}

  .thumb{position:relative;aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;
         background-size:cover;background-position:center;overflow:hidden}
  .thumb.foto{filter:saturate(.82) contrast(1.05) sepia(.14)}
  .thumb.foto::after{content:"";position:absolute;inset:0;
    background:linear-gradient(to top,rgba(58,38,22,.42),rgba(58,38,22,.04) 55%);}
  .thumb.gol{background:
      radial-gradient(circle at 50% 118%,var(--acs),transparent 62%),
      repeating-linear-gradient(45deg,rgba(51,48,43,.045) 0 1px,transparent 1px 11px),
      repeating-linear-gradient(-45deg,rgba(51,48,43,.045) 0 1px,transparent 1px 11px),
      linear-gradient(160deg,#F4EBDB,#E7DAC4)}
  .thumb.gol::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(60,35,20,.06)}
  .thumb .ic{font-size:44px;line-height:1;opacity:.92;filter:saturate(.92)}
  .thumb .jp{position:absolute;right:10px;bottom:6px;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:30px;color:var(--ac);opacity:.14;letter-spacing:.05em}

  .card .body{padding:15px 17px 18px;display:flex;flex-direction:column;gap:7px;flex:1}
  .card h3{margin:0;font-family:Georgia,serif;font-weight:400;font-size:19px;line-height:1.28}
  .kicker{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:9.5px;letter-spacing:.15em;
    text-transform:uppercase;color:var(--gri)}
  .kicker .dot{width:5px;height:5px;border-radius:50%;background:var(--ac);opacity:.8}
  .desc{font-size:13.5px;line-height:1.58;margin:0;color:#4A453C}
  .why{font-size:12.5px;line-height:1.55;color:#6B6558;border-left:2px solid var(--ac);padding-left:10px;margin:2px 0 0}
  .why b{display:block;font:400 9.5px/1.6 inherit;letter-spacing:.15em;text-transform:uppercase;color:var(--gri)}

  .stamp{position:absolute;top:10px;right:10px;width:56px;height:56px;border:2.5px solid var(--artar);
    border-radius:50%;color:var(--artar);font-family:Georgia,serif;font-size:13px;display:flex;align-items:center;
    justify-content:center;transform:rotate(-14deg) scale(0);opacity:0;background:rgba(255,255,255,.78)}
  .stamp.show{animation:stamp .45s ease-out forwards}
  @keyframes stamp{0%{transform:rotate(-40deg) scale(2);opacity:0}60%{opacity:1}100%{transform:rotate(-14deg) scale(1);opacity:1}}
  @media (prefers-reduced-motion:reduce){.stamp.show{animation:none;transform:rotate(-14deg) scale(1);opacity:1}
    .card.pick:hover{transform:none}.st:hover{transform:none}}
  .vs{text-align:center;font-family:Georgia,serif;letter-spacing:.26em;color:var(--gri);margin:14px 0 12px;font-size:11.5px}
  @media(max-width:680px){.duel{grid-template-columns:1fr}.thumb .ic{font-size:38px}}

  /* ---------- optiuni organizare ---------- */
  .opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}
  .opt{background:var(--hartie);border:1px solid var(--linie);border-radius:3px;padding:14px;text-align:left;display:block}
  .opt.sel{border-color:var(--artar);background:rgba(196,69,45,.08)}
  .opt b{display:block;font-family:Georgia,serif;font-weight:400;font-size:16px;margin-bottom:5px}
  .opt span{display:block;font-size:12.5px;line-height:1.5;color:#5F594D}
  .opt em{display:block;font-style:normal;font-size:11.5px;margin-top:6px;color:var(--kaki);line-height:1.45}

  /* ---------- rezultate ---------- */
  .rank{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--linie)}
  .rank:last-child{border-bottom:0}
  .num{font-family:Georgia,serif;font-size:20px;color:var(--kaki);min-width:34px}
  .bar{height:5px;background:#EAE1D2;border-radius:3px;overflow:hidden;margin-top:5px}
  .bar i{display:block;height:100%;background:var(--artar)}
  .small{font-size:11.5px;color:var(--gri)}
  .pill{display:inline-block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--linie);
        border-radius:99px;padding:3px 9px;margin:0 6px 6px 0;color:#5F594D}
  .ed{border:1px dashed var(--linie);border-radius:3px;padding:14px;margin-bottom:10px;background:var(--hartie2)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:640px){.two{grid-template-columns:1fr}}
  .status{position:fixed;left:0;right:0;bottom:0;background:var(--tus);color:var(--hartie);
    font-size:12px;padding:8px 16px;text-align:center;transform:translateY(100%);transition:transform .25s}
  .status.on{transform:none}
</style>
<div id="app"><div class="wrap" id="root"></div></div>
<div class="status" id="status"></div>
<script>
/* ============================================================================

   doar pe telefonul fiecăruia.

const URL_SCRIPT = "";

/* ============================================================================

const ORASE = ["Tokyo","Kyoto","Osaka & Nara","Excursii de o zi"];

/* culoare + kanji decorativ pentru fiecare oraș */
const ORAS_STIL = {
  "Tokyo":            {ac:"#C4452D", acs:"rgba(196,69,45,.14)",  jp:"東京"},
  "Kyoto":            {ac:"#6E7A52", acs:"rgba(110,122,82,.15)", jp:"京都"},
  "Osaka & Nara":     {ac:"#B07C2A", acs:"rgba(176,124,42,.15)", jp:"大阪"},
  "Excursii de o zi": {ac:"#4A6274", acs:"rgba(74,98,116,.15)",  jp:"遠足"}
};

/* INTERESE GENERALE (notă 1–10) */
let PREFERINTE = [
  {id:"p1", text:"Cât de mult vrei să vedem temple și sanctuare?"},
  {id:"p2", text:"Cât de mult vrei să ieșim în natură — munte, pădure, parcuri?"},
  {id:"p3", text:"Cât de mult vrei să mergem într-o dimineață la piață, pentru a gusta ton proaspăt, stridii, și alte produse maritime?"},
  {id:"p4", text:"Cât de mult vrei să încercăm diverse produse din bucătăria tradițională japoneză (în afară de sushi)?"},
  {id:"p5", text:"Cât de mult te atrag deserturile și patiseria japoneză?"},
  {id:"p6", text:"Cât de mult preferi taxiul între destinații, față de transportul public, chiar dacă e mai scump?"},
  {id:"p7", text:"Cât de dispusă/dispus ești să ne trezim foarte devreme, pentru a evita aglomerația de turiști (adică la 6 dimineața)?"},
  {id:"p8", text:"Cât de important e să avem onsen și saună la fiecare hotel? (Onsen este o baie termală tradițională japoneză alimentată de izvoare geotermale naturale bogate în minerale)"},
  {id:"p9", text:"Cât de mult dorești să explorezi viața urbană din Tokio pe timp de noapte — lumini neon, baruri (izakaya), străzi aglomerate?"},
  {id:"p10", text:"Cât de mult te atrag muzeele de istorie și artă japoneză?"},
  {id:"p11", text:"Cât de mult îți dorești să avem timp de shopping (pentru haine, cadouri, suveniruri) și să explorăm faimosul cartier de shopping - Ginza?"},
  {id:"p12", text:"Cât de mult vrei să avem zile lejere, cu pauze și timp liber de a savura momentul?"},
  {id:"p13", text:"Cât de mult te atrag experiențele tradiționale japoneze (ritualul ceaiului, probarea kimonoului, ore de caligrafie)?"},
  {id:"p15", text:"Cât de mult preferi să vizitezi locuri frumoase, dar mai puțin cunoscute, în schimbul atracțiilor faimoase și aglomerate?"}
];

/* CARDURI
   img  — numele fișierului din același folder de GitHub (ex. "shibuya_sky.jpg")
   tag  — două-trei cuvinte: tipul experienței
   timp — cât durează, orientativ                                            */
let CARDURI = [
 /* --- TOKYO --- */
 {id:"t1",oras:"Tokyo",titlu:"Shibuya Sky la apus",emoji:"🌆",img:"shibuya_sky.jpg",tag:"Panoramă",timp:"1–2 ore",
  desc:"Ultimul nivel al zgârie-norului Shibuya Scramble Square, la 230 de metri: nu o cameră cu geamuri, ci o terasă complet descoperită, cu iarbă, șezlonguri, vânt și un colț de sticlă de unde privești drept în jos, în celebra intersecție Shibuya.",
  dece:"E singurul loc din Tokyo unde vezi orașul mișcându-se sub tine, iar pe vreme senină apare și silueta muntelui Fuji peste acoperișuri. Intervalul de apus se epuizează cu câteva săptămâni înainte, deci biletul se ia din timp."},
 {id:"t2",oras:"Tokyo",titlu:"Tokyo Skytree",emoji:"🗼",img:"tokyo_skytree.jpg",tag:"Panoramă",timp:"1–2 ore",
  desc:"Cel mai înalt turn din Japonia — 634 de metri — ridicat peste râu, în cartierul Sumida. Are două niveluri de observație închise, la 350 și la 450 de metri, legate între ele de o rampă în spirală cu porțiuni de podea din sticlă.",
  dece:"Cea mai înaltă priveliște pe care o poți cumpăra în Japonia și singura care funcționează la fel de bine pe ploaie. Fiind închis cu geamuri, se vede enorm, dar se simte mai puțin decât la Shibuya Sky."},
 {id:"t3",oras:"Tokyo",titlu:"teamLab — artă digitală imersivă",emoji:"💠",img:"",tag:"Artă",timp:"2 ore",
  desc:"Muzeul colectivului japonez teamLab: săli întregi în care lumina e proiectată pe pereți, pe podea și pe tine, iar lucrările reacționează când te apropii. La teamLab Planets se merge desculț, o parte din trasee trec prin apă până la genunchi.",
  dece:"E ora cea mai fotografiată a vacanței și funcționează la fel de bine pentru copii și pentru adulți. Se rezervă cu săptămâni înainte, pe interval orar fix, altfel nu mai prinzi loc."},
 {id:"t4",oras:"Tokyo",titlu:"Piața Tsukiji dimineața",emoji:"🐟",img:"tsukiji.jpg",tag:"Mâncare",timp:"2 ore, dimineața",
  desc:"Piața interioară s-a mutat la Toyosu în 2018, dar străzile exterioare din Tsukiji au rămas exact ce erau: vreo patru sute de tarabe și bucătării mici, unde se mănâncă în picioare — tamagoyaki cald, scoici pe grătar, uni proaspăt, brochete de wagyu — printre magazine de cuțite și de ceai.",
  dece:"Ieftin, haotic și democratic: fiecare mănâncă exact ce vrea, fără meniu comun și fără rezervare. E cel mai bun argument pentru o trezire devreme — după ora 10 devine greu de circulat."},
 {id:"t5",oras:"Tokyo",titlu:"Golden Gai — baruri minuscule",emoji:"🏮",img:"golden_gai.jpg",tag:"Seara",timp:"2–3 ore",
  desc:"Șase alei înghesuite în Shinjuku, rămase din Tokyo-ul de după război, cu peste două sute de baruri de mărimea unei camere de cămin. Fiecare are obsesia lui — punk, jazz, filme vechi, motociclete — și cam șase locuri la tejghea.",
  dece:"De aici pleacă povestea pe care o repeți un an, pentru că stai umăr la umăr cu barmanul și cu necunoscuții de lângă tine. De știut: multe baruri au o taxă de masă de câteva sute de yeni, unele primesc doar clienți fideli, și un grup de șase nu încape aproape nicăieri — ne împărțim."},
 {id:"t6",oras:"Tokyo",titlu:"Antrenament de sumo dimineața",emoji:"🤼",img:"",tag:"Cultură",timp:"2 ore, foarte devreme",
  desc:"Luptătorii de sumo trăiesc și se antrenează în „grajduri” (heya), iar antrenamentul de dimineață începe în zori. Se intră cu ghid, se stă jos pe podea, în tăcere, la câțiva metri de ring, cât timp ei repetă aceleași ciocniri, ore în șir.",
  dece:"E sport adevărat, fără ambalaj turistic — sunetul din sală rămâne cu tine. În schimb, e foarte devreme, se stă nemișcat și nu se vorbește, deci nu e pentru toată lumea."},
 {id:"t7",oras:"Tokyo",titlu:"Meiji Jingu & Harajuku",emoji:"⛩️",img:"",tag:"Sanctuar",timp:"jumătate de zi",
  desc:"Sanctuar shinto ridicat în 1920 pentru împăratul Meiji, ascuns într-o pădure de o sută de mii de copaci donați din toată Japonia. La ieșire, la două minute de mers, începe strada Takeshita din Harajuku, cu vitrine, crêpes și adolescenți îmbrăcați ca într-un desen animat.",
  dece:"E cel mai rapid contrast dintre Japonia veche și cea nouă, și e gratis. Fiind aproape numai mers pe jos, e perfectă ca primă dimineață, când suntem oricum treji la 5 din cauza decalajului."},
 {id:"t8",oras:"Tokyo",titlu:"Shimokitazawa după-amiaza",emoji:"🎸",img:"",tag:"Cartier",timp:"2–3 ore",
  desc:"Cartier de case joase și străzi fără trotuar, la un sfert de oră cu trenul de Shibuya: magazine vintage, discuri cu viniluri, librării mici, cafenele cu patru mese și baruri de curry.",
  dece:"E locul unde mergem când ne-am săturat de mulțime și de obiective. Nu e nimic de bifat aici — exact ăsta e farmecul, dar înseamnă că cine vrea listă de atracții s-ar putea plictisi."},
 {id:"t9",oras:"Tokyo",titlu:"Seară în arcade la Akihabara",emoji:"🕹️",img:"",tag:"Seara",timp:"2 ore",
  desc:"Cartierul electronicelor, cu clădiri de câte șapte etaje pline de jocuri: simulatoare de curse, tobe de ritm, mașini cu gheare, etaje întregi de console retro și de figurine.",
  dece:"E ieftin (o sută de yeni jocul), competitiv și ține ocupat un grup cu gusturi complet diferite. E și foarte zgomotos și plin de fum de la fumători — o oră ajunge pentru unii."},
 {id:"t10",oras:"Tokyo",titlu:"Croazieră pe Sumida spre Asakusa",emoji:"⛵",img:"",tag:"Pe apă",timp:"40 de minute",
  desc:"Vaporaș care urcă râul Sumida de la grădinile Hamarikyu până la Asakusa, pe sub douăsprezece poduri, fiecare vopsit altfel. La capăt te lasă lângă Senso-ji, cel mai vechi templu din Tokyo, ridicat în anul 645.",
  dece:"E transportul care e de fapt atracția: costă cât un bilet de metrou, odihnește picioarele și oferă cel mai bun unghi spre Skytree. Dacă plouă tare, priveliștea se pierde."},
 {id:"t11",oras:"Tokyo",titlu:"Grădina Rikugien",emoji:"🍁",img:"rikugien.jpg",tag:"Grădină",timp:"1–2 ore",
  desc:"Grădină de plimbare terminată în 1702 pentru un consilier al shogunului, construită ca o poezie tridimensională: un iaz central, dealuri mici, poduri de piatră și optzeci și opt de scene inspirate din versuri clasice.",
  dece:"E cea mai liniștită oră de verde din Tokyo și se combină ușor cu o zi în oraș. Iluminatul de seară din sezonul frunzelor roșii începe de obicei spre finalul lui noiembrie, deci în intervalul nostru s-ar putea să prindem grădina doar ziua — tot merită."},

 /* --- KYOTO --- */
 {id:"k1",oras:"Kyoto",titlu:"Fushimi Inari în zori",emoji:"🦊",img:"",tag:"Sanctuar",timp:"2–3 ore, dimineața",
  desc:"Sanctuarul zeului orezului și al prosperității, cu peste zece mii de porți vermilion donate de companii japoneze, fiecare cu numele donatorului scris pe spate. Porțile urcă în serpentine pe muntele Inari, până la 233 de metri; bucla completă cere două-trei ore.",
  dece:"E deschis non-stop și e gratis, iar la șapte dimineața tunelul de porți e aproape gol și chiar dă fiori. La zece e coadă la fiecare fotografie — diferența dintre cele două vizite e enormă."},
 {id:"k2",oras:"Kyoto",titlu:"Arashiyama — bambus și maimuțe",emoji:"🎋",img:"",tag:"Natură",timp:"jumătate de zi",
  desc:"Marginea de vest a orașului: aleea prin pădurea de bambus, podul Togetsukyo peste râu și, pe dealul din față, un parc unde trăiesc liber vreo sută treizeci de macaci japonezi — se urcă douăzeci de minute pe jos până sus.",
  dece:"Urcarea la maimuțe și panorama de acolo sunt partea pe care o ții minte. Pădurea de bambus, în schimb, se traversează în zece minute și e plină de lume — venim devreme sau o luăm ca bonus."},
 {id:"k3",oras:"Kyoto",titlu:"Kinkaku-ji, pavilionul de aur",emoji:"🪙",img:"",tag:"Templu",timp:"1 oră",
  desc:"Pavilion cu două etaje acoperite integral cu foiță de aur, ridicat în 1397 ca vilă de retragere a unui shogun și transformat apoi în templu zen. Clădirea de azi e o reconstrucție din 1955, după ce originalul a fost incendiat de un călugăr — poveste care a devenit roman celebru.",

/* ==================== SFÂRȘITUL ZONEI DE EDITAT ==================== */

const $=s=>document.querySelector(s);
const K=32,BASE=1500;
const ARTIFACT = typeof window.storage!=="undefined";
let S={me:"",oras:"Tokyo",tab:"ghid",pair:null,loading:true,
       date:{prefs:{},dueluri:[],alegeri:{}},toti:{},organizator:false};

function status(t,ms=2200){const el=$("#status");el.textContent=t;el.classList.add("on");
  clearTimeout(status._t);status._t=setTimeout(()=>el.classList.remove("on"),ms);}

/* ---------- salvare / citire ---------- */
function citesteDeLaSheet(){
  return new Promise(res=>{
    if(!URL_SCRIPT) return res(null);
    const cb="cb"+Date.now();
    window[cb]=d=>{res(d);delete window[cb];sc.remove()};
    const sc=document.createElement("script");
    sc.src=URL_SCRIPT+"?callback="+cb;
    sc.onerror=()=>{res(null);sc.remove()};
    document.head.appendChild(sc);
    setTimeout(()=>{if(window[cb]){res(null);delete window[cb]}},8000);
  });
}
async function salveaza(){
  S.toti[S.me]=S.date;
  if(URL_SCRIPT){
    try{
      await fetch(URL_SCRIPT,{method:"POST",mode:"no-cors",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify({nume:S.me,date:S.date})});
      status("Salvat ✓");
    }catch(e){status("Nu am reușit să salvez — verifică internetul")}
  }else if(ARTIFACT){
    try{await window.storage.set("jp:r:"+S.me,JSON.stringify(S.date),true)}catch(e){}
  }
  try{localStorage.setItem("jp:"+S.me,JSON.stringify(S.date))}catch(e){}
}
async function load(){
  const d=await citesteDeLaSheet();
  if(d) S.toti=d;
  else if(ARTIFACT){
    try{const l=await window.storage.list("jp:r:",true);
      for(const k of (l?.keys||[])){const v=await window.storage.get(k,true);
        S.toti[k.replace("jp:r:","")]=JSON.parse(v.value);}}catch(e){}
  }
  S.loading=false;render();
}

/* ---------- elo ---------- */
function elo(dueluri,oras){
  const ids=CARDURI.filter(c=>c.oras===oras).map(c=>c.id);
  const r={},n={};ids.forEach(i=>{r[i]=BASE;n[i]=0});
  (dueluri||[]).filter(d=>d.o===oras).forEach(d=>{
    if(r[d.w]===undefined||r[d.l]===undefined)return;
    const e=1/(1+Math.pow(10,(r[d.l]-r[d.w])/400));
    r[d.w]+=K*(1-e);r[d.l]-=K*(1-e);n[d.w]++;n[d.l]++;
  });
  return{r,n,ids};
}
function urmatoareaPereche(oras){
  const{r,n,ids}=elo(S.date.dueluri,oras);
  if(ids.length<2)return null;
  const vazute=new Set((S.date.dueluri||[]).filter(d=>d.o===oras).map(d=>[d.w,d.l].sort().join("|")));
  const tinta=Math.max(4,Math.ceil(Math.log2(ids.length))+2);
  const pool=ids.filter(i=>n[i]<tinta);
  if(!pool.length)return null;
  const a=pool.sort((x,y)=>n[x]-n[y]||Math.random()-.5)[0];
  const c=ids.filter(i=>i!==a&&!vazute.has([a,i].sort().join("|")));
  if(!c.length)return null;
  c.sort((x,y)=>Math.abs(r[x]-r[a])-Math.abs(r[y]-r[a]));
  const b=c[Math.floor(Math.random()*Math.min(3,c.length))];
  return Math.random()<.5?[a,b]:[b,a];
}
const card=id=>CARDURI.find(c=>c.id===id);
const esc=s=>(s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const stil=o=>ORAS_STIL[o]||ORAS_STIL["Tokyo"];

function thumb(c){
  const s=stil(c.oras);
  if(c.img) return `<div class="thumb foto" style="background-image:url('${esc(c.img)}')"></div>`;
  return `<div class="thumb gol" style="--ac:${s.ac};--acs:${s.acs}">
            <span class="ic">${esc(c.emoji)}</span><span class="jp">${s.jp}</span></div>`;
}
function corpCard(c){
  const s=stil(c.oras);
  return `<div class="body" style="--ac:${s.ac}">
    <div class="kicker"><span class="dot"></span>${esc(c.oras)}${c.tag?" · "+esc(c.tag):""}${c.timp?" · "+esc(c.timp):""}</div>

    <p class="why"><b>De ce merită</b>${esc(c.dece)}</p></div>`;
}

function render(){
  const root=$("#root");
  if(S.loading){root.innerHTML=antet()+`<p class="sub">Se încarcă…</p>`;return;}
  if(!S.me){
    root.innerHTML=antet()+
    `<p class="sub">31 octombrie – 14 noiembrie 2026 · 6 persoane</p>
    <div class="panel" style="max-width:520px">
      <h2>Bine ai venit 🍁</h2>
      <p class="note" style="margin-bottom:6px">Site-ul are două roluri. Întâi e o broșură: în <b>Ghid</b> găsești toate locurile pe care le putem vizita, ce sunt și de ce ar merita. Apoi e un chestionar: notezi ce te atrage, alegi între variante și răspunzi la câteva întrebări de organizare. Cam 10–15 minute în total.</p>
      <label for="nm">Numele tău</label><input id="nm" placeholder="ex. Ana" autofocus>
      <div class="row" style="margin-top:14px"><button class="primary" id="go">Începe</button>
      <button id="org">Sunt organizatoarea</button></div>
    </div>`;
    $("#go").onclick=()=>{const v=$("#nm").value.trim();if(!v)return;S.me=v;
      S.date=S.toti[v]||JSON.parse(localStorage.getItem("jp:"+v)||"null")||{prefs:{},dueluri:[],alegeri:{}};render()};
    $("#nm").onkeydown=e=>{if(e.key==="Enter")$("#go").click()};
    $("#org").onclick=()=>{S.me="Organizator";S.organizator=true;S.tab="rez";
      S.date=S.toti["Organizator"]||{prefs:{},dueluri:[],alegeri:{}};render()};
    return;
  }
  const taburi=[["ghid","Ghid"],["pref","1 · Ce te atrage"],["duel","2 · Tu ce alegi"],
                ["aleg","3 · Organizare"],["rez","Rezultate"],["ed","Editare"]];
  root.innerHTML=antet()+
   `<p class="sub">${esc(S.me)} · ${Object.keys(S.date.prefs).length}/${PREFERINTE.length} notate · ${S.date.dueluri.length} alegeri între locuri · ${Object.keys(S.date.alegeri).length}/${ALEGERI.length} întrebări de organizare</p>
   <div class="tabs">${taburi.map(t=>`<button class="tab ${S.tab===t[0]?"active":""}" data-t="${t[0]}">${t[1]}</button>`).join("")}</div>
   <div id="view"></div>`;
  root.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;S.pair=null;render()});
  ({ghid:vGhid,pref:vPref,duel:vDuel,aleg:vAleg,rez:vRez,ed:vEd})[S.tab]();
}
const baraOrase=()=>`<div class="row" style="margin-bottom:14px">${ORASE.map(o=>`<button class="${S.oras===o?"on":""}" data-o="${o}">${o}</button>`).join("")}</div>`;
const legOrase=()=>document.querySelectorAll("[data-o]").forEach(b=>b.onclick=()=>{S.oras=b.dataset.o;S.pair=null;render()});

/* ---------- 0. GHID (broșura) ---------- */
function vGhid(){
  const v=$("#view");
  const lista=CARDURI.filter(c=>c.oras===S.oras);
  v.innerHTML=`<div class="panel"><h2>Ce putem face în Japonia 🍁</h2>
    <p class="note">Aici nu trebuie să alegi nimic — doar citește. Fiecare loc are o descriere scurtă a ce este și un rând sincer despre de ce ar merita (și ce nu e grozav la el). Când ești lămurit, treci la pasul 1 din meniul de sus.</p></div>`
    + baraOrase()
    + `<p class="meta">${esc(S.oras)} · ${lista.length} locuri</p>
       <div class="grila">${lista.map(c=>`<article class="card static">${thumb(c)}${corpCard(c)}</article>`).join("")}</div>`;
  legOrase();
}

/* ---------- 1. CE TE ATRAGE ---------- */
function vPref(){
  const v=$("#view");
  v.innerHTML=`<div class="panel"><h2>Cum arată vacanța ta ideală? 🍂</h2>
  <p class="note">Notează fiecare afirmație de la 1 (deloc) la 10 (neapărat). Nu există răspuns greșit — scopul e să vedem unde grupul e de acord și unde nu.</p></div>
  <div class="panel">${PREFERINTE.map(p=>{const val=S.date.prefs[p.id]||0;
    return `<div class="pref"><div class="q">${esc(p.text)}</div>
    <div class="stars" data-p="${p.id}">${Array.from({length:10},(_,i)=>
      `<button class="st ${i<val?"fill":""}" data-v="${i+1}" aria-label="${i+1} din 10">★</button>`).join("")}
      <span class="scoretag">${val?val+" / 10":"nenotat"}</span></div></div>`}).join("")}</div>`;
  v.querySelectorAll(".stars").forEach(g=>g.querySelectorAll(".st").forEach(b=>b.onclick=async()=>{
    S.date.prefs[g.dataset.p]=+b.dataset.v;vPref();await salveaza();
  }));
}

/* ---------- 2. TU CE ALEGI (fostele „dueluri") ---------- */
function vDuel(){
  if(!S.pair)S.pair=urmatoareaPereche(S.oras);
  const v=$("#view");
  if(!S.pair){
    v.innerHTML=baraOrase()+`<div class="panel"><h2>${esc(S.oras)} — gata 🍁</h2>
      <p class="note">Ai comparat destule perechi pentru un clasament stabil. Treci la alt oraș, sau vezi <b>Rezultate</b>.</p></div>`;
    legOrase();return;
  }
  const[a,b]=S.pair.map(card);
  const unul=(c,alt)=>`<button class="card pick" data-w="${c.id}" data-l="${alt.id}">
    ${thumb(c)}${corpCard(c)}<div class="stamp">選</div></button>`;
  v.innerHTML=baraOrase()+`<div class="panel" style="padding:14px 18px">
      <p class="note" style="margin:0">Îți arătăm două locuri o dată. Apasă pe cel pe care l-ai prefera dacă ar trebui să alegi doar unul — răspunsurile se adună într-un clasament al grupului. Dacă îți plac la fel, sari peste.</p></div>
    <p class="vs">CE AI PREFERA SĂ FACEM?</p>
    <div class="duel">${unul(a,b)}${unul(b,a)}</div>
    <div class="row" style="margin-top:16px;justify-content:center">
      <button id="skip">N-am preferință — sari</button>
      <button id="undo" ${S.date.dueluri.length?"":"disabled"}>Anulează ultima</button></div>`;
  legOrase();
  v.querySelectorAll(".card").forEach(el=>el.onclick=async()=>{
    el.querySelector(".stamp").classList.add("show");
    S.date.dueluri.push({w:el.dataset.w,l:el.dataset.l,o:S.oras,t:Date.now()});
    salveaza();
    setTimeout(()=>{S.pair=urmatoareaPereche(S.oras);render()},380);
  });
  $("#skip").onclick=()=>{S.pair=urmatoareaPereche(S.oras);render()};
  $("#undo").onclick=async()=>{S.date.dueluri.pop();await salveaza();S.pair=urmatoareaPereche(S.oras);render()};
}

/* ---------- 3. ORGANIZARE ---------- */
function vAleg(){
  const v=$("#view");
  v.innerHTML=`<div class="panel"><h2>Cum vrei să fie organizată vacanța?</h2>
  <p class="note">Aici nu clasificăm — alegem. O singură variantă la fiecare întrebare.</p></div>`+
  ALEGERI.map(q=>`<div class="panel"><div class="meta">${esc(q.context||"organizare")}</div>
    <h2 style="font-size:18px">${esc(q.intrebare)}</h2>
    <div class="opts" data-q="${q.id}">${q.optiuni.map((o,i)=>
      `<button class="opt ${S.date.alegeri[q.id]===i?"sel":""}" data-i="${i}">
        <b>${esc(o.titlu)}</b><span>${esc(o.desc)}</span>${o.nota?`<em>${esc(o.nota)}</em>`:""}</button>`).join("")}</div></div>`).join("");
  v.querySelectorAll(".opts").forEach(g=>g.querySelectorAll(".opt").forEach(b=>b.onclick=async()=>{
    S.date.alegeri[g.dataset.q]=+b.dataset.i;vAleg();await salveaza();
  }));
}

/* ---------- REZULTATE ---------- */
function vRez(){
  const oameni=Object.keys(S.toti).length?Object.keys(S.toti):[S.me];
  const v=$("#view");
  const medii=PREFERINTE.map(p=>{
    const note=oameni.map(o=>S.toti[o]?.prefs?.[p.id]).filter(x=>x>0);
    const m=note.length?note.reduce((a,b)=>a+b,0)/note.length:0;
    const sd=note.length>1?Math.sqrt(note.reduce((s,x)=>s+(x-m)**2,0)/note.length):0;
    return{p,m,sd};
  }).sort((a,b)=>b.m-a.m);
  const ids=CARDURI.filter(c=>c.oras===S.oras).map(c=>c.id);
  const sum={},sp={};ids.forEach(i=>{sum[i]=0;sp[i]=[]});
  oameni.forEach(o=>{const{r}=elo(S.toti[o]?.dueluri||[],S.oras);ids.forEach(i=>{sum[i]+=r[i];sp[i].push(r[i])})});
  const ord=ids.slice().sort((a,b)=>sum[b]-sum[a]);
  const dev=i=>{const m=sum[i]/oameni.length;return Math.sqrt(sp[i].reduce((s,x)=>s+(x-m)**2,0)/sp[i].length)};
  const maxd=Math.max(1,...ids.map(dev));
  v.innerHTML=`<div class="row" style="margin-bottom:12px"><button id="reload">🔄 Reîncarcă răspunsurile</button></div>
    <div class="panel"><div class="meta">Interese generale — media grupului (${oameni.length} persoane)</div>
    ${medii.map(x=>`<div class="rank"><span class="num">${x.m?x.m.toFixed(1):"–"}</span>
      <div style="flex:1"><div style="font-size:14px">${esc(x.p.text)}</div>
      <div class="bar"><i style="width:${x.m*10}%"></i></div></div>
      <span class="small">${x.sd>2.5?"⚡ păreri împărțite":x.sd<1.2?"✓ consens":"~ mixt"}</span></div>`).join("")}</div>`
  + baraOrase() +
  `<div class="panel"><div class="meta">Clasamentul grupului — ${esc(S.oras)}</div>
    ${ord.map((id,i)=>{const c=card(id);const d=dev(id);
      return `<div class="rank"><span class="num">${String(i+1).padStart(2,"0")}</span>
      <div style="flex:1"><div>${esc(c.titlu)}</div>
      <div class="small">${d>maxd*.6?"⚡ păreri împărțite":d<maxd*.25?"✓ consens":"~ mixt"}</div></div></div>`}).join("")}</div>
  <div class="panel"><div class="meta">Alegeri organizatorice</div>
    ${ALEGERI.map(q=>{const nr=q.optiuni.map((_,i)=>oameni.filter(o=>S.toti[o]?.alegeri?.[q.id]===i).length);
      const tot=nr.reduce((a,b)=>a+b,0)||1;
      return `<div style="padding:10px 0;border-bottom:1px solid var(--linie)">
        <div style="font-size:14px;margin-bottom:6px">${esc(q.intrebare)}</div>
        ${q.optiuni.map((o,i)=>`<div class="row" style="gap:8px;margin-bottom:4px">
          <span class="small" style="min-width:190px">${esc(o.titlu)}</span>
          <div class="bar" style="flex:1;margin:0"><i style="width:${nr[i]/tot*100}%"></i></div>
          <span class="small">${nr[i]}</span></div>`).join("")}</div>`}).join("")}</div>
  <div class="panel"><div class="meta">Cine a răspuns</div>
    ${oameni.map(o=>`<span class="pill">${esc(o)}</span>`).join("")}</div>`;
  legOrase();
  $("#reload").onclick=async()=>{status("Se încarcă…");const d=await citesteDeLaSheet();if(d)S.toti=d;render();};
}

/* ---------- EDITARE ---------- */
function vEd(){
  const v=$("#view");
  v.innerHTML=`<div class="panel"><h2>Editare carduri 🍁</h2>
    <p class="note">Aici editezi textele și pui fotografii. Pentru poze, scrie exact numele fișierului urcat pe GitHub, în același folder cu index.html (ex. <b>shibuya_sky.jpg</b>). Modificările sunt doar în acest browser — la final apasă <b>Exportă JSON</b> și trimite-mi fișierul, sau lipește-l în index.html.</p>
    <div class="row" style="margin-top:12px">
      <button id="exp">Exportă JSON</button><button id="imp">Importă JSON</button>
      <button id="nou" class="primary">Card nou în ${esc(S.oras)}</button></div></div>`
  + baraOrase() +
  CARDURI.filter(c=>c.oras===S.oras).map(c=>`<div class="ed" data-id="${c.id}">
      <div class="two">
        <div><label>Titlu</label><input data-f="titlu" value="${esc(c.titlu)}"></div>
        <div><label>Oraș</label><select data-f="oras">${ORASE.map(o=>`<option ${o===c.oras?"selected":""}>${o}</option>`).join("")}</select></div>
      </div>
      <div class="two">
        <div><label>Emoji (dacă nu ai poză)</label><input data-f="emoji" value="${esc(c.emoji)}"></div>
        <div><label>Fișier fotografie</label><input data-f="img" value="${esc(c.img)}" placeholder="ex. shibuya_sky.jpg"></div>
      </div>
      <div class="two">
        <div><label>Etichetă (tip de experiență)</label><input data-f="tag" value="${esc(c.tag||"")}" placeholder="ex. Panoramă"></div>
        <div><label>Cât durează</label><input data-f="timp" value="${esc(c.timp||"")}" placeholder="ex. 1–2 ore"></div>
      </div>
      <label>Ce este — mini-biografia locului</label><textarea data-f="desc">${esc(c.desc)}</textarea>
      <label>De ce merită — argumentul sincer, cu tot cu capcană</label><textarea data-f="dece">${esc(c.dece)}</textarea>
      <div class="row" style="margin-top:10px"><button class="primary" data-act="save">Salvează</button>
      <button data-act="del">Șterge</button>
      ${c.img?`<img src="${esc(c.img)}" alt="" style="height:46px;border-radius:2px">`:""}</div>
    </div>`).join("");
  legOrase();
  v.querySelectorAll(".ed").forEach(box=>{
    const c=card(box.dataset.id);
    box.querySelector('[data-act="save"]').onclick=()=>{
      box.querySelectorAll("[data-f]").forEach(f=>c[f.dataset.f]=f.value.trim());
      status("Card actualizat — nu uita să exporți");render();
    };
    box.querySelector('[data-act="del"]').onclick=()=>{
      if(!confirm("Ștergi cardul?"))return;
      CARDURI=CARDURI.filter(x=>x.id!==c.id);render();
    };
  });
  $("#nou").onclick=()=>{CARDURI.push({id:"n"+Date.now(),oras:S.oras,titlu:"Titlu nou",emoji:"📍",img:"",tag:"",timp:"",desc:"",dece:""});render()};
  $("#exp").onclick=()=>{
    const b=new Blob([JSON.stringify({PREFERINTE,CARDURI,ALEGERI},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="japonia-continut.json";a.click();
  };
  $("#imp").onclick=()=>{
    const i=document.createElement("input");i.type="file";i.accept=".json";
    i.onchange=async()=>{try{const d=JSON.parse(await i.files[0].text());
      if(d.PREFERINTE)PREFERINTE=d.PREFERINTE;if(d.CARDURI)CARDURI=d.CARDURI;if(d.ALEGERI)ALEGERI=d.ALEGERI;render();
      }catch(e){alert("Fișier invalid.")}};
    i.click();
  };
}
load();
</script>
