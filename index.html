<!DOCTYPE html>
<meta charset="utf-8">
<title>日本の秋 · Planificator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --hartie:#F5EFE4; --hartie2:#FFFCF6; --tus:#33302B; --gri:#8A8377;
    --artar:#C4452D; --kaki:#B07C2A; --ceai:#6E7A52; --linie:#E2D8C6;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--hartie)}
  #app{color:var(--tus);font-family:"Helvetica Neue",Inter,system-ui,sans-serif;min-height:100vh;
       padding:26px 18px 80px;
       background-image:radial-gradient(circle at 90% 0%,rgba(196,69,45,.07),transparent 45%),
                        radial-gradient(circle at 5% 12%,rgba(110,122,82,.07),transparent 40%)}
  .wrap{max-width:1060px;margin:0 auto}
  .kanji{font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;font-size:clamp(30px,6vw,46px);
         color:var(--artar);letter-spacing:.08em;margin:0;line-height:1.1}
  .kanji small{font-size:.42em;letter-spacing:.04em}
  h1{font-family:Georgia,serif;font-weight:400;font-size:clamp(15px,2.4vw,19px);letter-spacing:.2em;
     text-transform:uppercase;margin:8px 0 2px;color:var(--tus)}
  h2{font-family:Georgia,serif;font-weight:400;font-size:21px;margin:0 0 10px}
  .sub{color:var(--gri);font-size:12.5px;letter-spacing:.05em;margin:0 0 22px}
  .row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  button{font:inherit;font-size:13px;letter-spacing:.04em;cursor:pointer;background:var(--hartie2);
    color:var(--tus);border:1px solid var(--linie);border-radius:2px;padding:9px 14px;
    transition:background .15s,border-color .15s,transform .15s}
  button:hover{border-color:var(--artar)}
  button:focus-visible{outline:2px solid var(--kaki);outline-offset:2px}
  button.primary{background:var(--artar);border-color:var(--artar);color:#fff}
  button.primary:hover{background:#a83722}
  button.on{background:var(--tus);color:var(--hartie);border-color:var(--tus)}
  button[disabled]{opacity:.4;cursor:default}
  input,textarea,select{font:inherit;font-size:14px;background:var(--hartie2);color:var(--tus);
    border:1px solid var(--linie);border-radius:2px;padding:9px 11px;width:100%}
  textarea{min-height:64px;line-height:1.45;resize:vertical}
  label{display:block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gri);margin:12px 0 5px}
  .tabs{display:flex;gap:24px;border-bottom:1px solid var(--linie);margin-bottom:20px;flex-wrap:wrap}
  .tab{padding:0 0 10px;border:0;border-bottom:2px solid transparent;border-radius:0;letter-spacing:.13em;
       text-transform:uppercase;font-size:10.5px;color:var(--gri);background:none}
  .tab:hover{background:none;color:var(--tus)}
  .tab.active{color:var(--artar);border-bottom-color:var(--artar)}
  .panel{background:var(--hartie2);border:1px solid var(--linie);border-radius:3px;padding:18px;margin-bottom:14px}
  .note{font-size:12px;color:var(--gri);line-height:1.6}
  .meta{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gri);margin-bottom:8px}

  .pref{border-bottom:1px solid var(--linie);padding:14px 2px}
  .pref .q{font-size:15px;line-height:1.4;margin-bottom:9px}
  .stars{display:flex;gap:2px;flex-wrap:wrap;align-items:center}
  .st{width:28px;height:30px;border:0;background:none;padding:0;font-size:19px;line-height:1;color:#DCD2C0}
  .st:hover{background:none;border:0;transform:translateY(-2px)}
  .st.fill{color:var(--artar)}
  .scoretag{font-size:12px;color:var(--gri);margin-left:8px}

  .duel{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--hartie2);color:var(--tus);border-radius:3px;overflow:hidden;text-align:left;padding:0;
    border:1px solid var(--linie);position:relative;display:flex;flex-direction:column;
    box-shadow:0 8px 22px rgba(80,60,40,.09);transition:transform .18s,box-shadow .18s}
  .card:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(80,60,40,.16);border-color:var(--artar)}
  .thumb{aspect-ratio:3/2;height:auto;display:flex;align-items:center;justify-content:center;font-size:52px;
         background-size:cover;background-position:center;filter:saturate(.92) contrast(1.03);
         box-shadow:inset 0 -70px 60px -40px rgba(60,35,20,.42), inset 0 0 0 1px rgba(60,35,20,.08)}
  .card .body{padding:14px 16px 18px}
  .card h3{margin:0 0 4px;font-family:Georgia,serif;font-weight:400;font-size:19px;line-height:1.25}
  .desc{font-size:13.5px;line-height:1.5;margin:0 0 8px}
  .why{font-size:12.5px;line-height:1.5;color:#6B6558;border-left:2px solid var(--artar);padding-left:9px}
  .stamp{position:absolute;top:10px;right:10px;width:56px;height:56px;border:2.5px solid var(--artar);
    border-radius:50%;color:var(--artar);font-family:Georgia,serif;font-size:13px;display:flex;align-items:center;
    justify-content:center;transform:rotate(-14deg) scale(0);opacity:0;background:rgba(255,255,255,.75)}
  .stamp.show{animation:stamp .45s ease-out forwards}
  @keyframes stamp{0%{transform:rotate(-40deg) scale(2);opacity:0}60%{opacity:1}100%{transform:rotate(-14deg) scale(1);opacity:1}}
  @media (prefers-reduced-motion:reduce){.stamp.show{animation:none;transform:rotate(-14deg) scale(1);opacity:1}
    .card:hover{transform:none}.st:hover{transform:none}}
  .vs{text-align:center;font-family:Georgia,serif;letter-spacing:.26em;color:var(--gri);margin:14px 0 12px;font-size:11.5px}
  @media(max-width:640px){.duel{grid-template-columns:1fr}.thumb{font-size:40px}}

  .opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
  .opt{background:var(--hartie);border:1px solid var(--linie);border-radius:3px;padding:14px;text-align:left;display:block}
  .opt.sel{border-color:var(--artar);background:rgba(196,69,45,.08)}
  .opt b{display:block;font-family:Georgia,serif;font-weight:400;font-size:16px;margin-bottom:5px}
  .opt span{display:block;font-size:12.5px;line-height:1.45;color:#5F594D}
  .opt em{display:block;font-style:normal;font-size:11.5px;margin-top:6px;color:var(--kaki)}

  .rank{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--linie)}
  .num{font-family:Georgia,serif;font-size:20px;color:var(--kaki);min-width:34px}
  .bar{height:5px;background:#EAE1D2;border-radius:3px;overflow:hidden;margin-top:5px}
  .bar i{display:block;height:100%;background:var(--artar)}
  .small{font-size:11.5px;color:var(--gri)}
  .pill{display:inline-block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--linie);
        border-radius:99px;padding:3px 9px;margin:0 6px 6px 0;color:#5F594D}
  .ed{border:1px dashed var(--linie);border-radius:3px;padding:14px;margin-bottom:10px;background:var(--hartie2)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:640px){.two{grid-template-columns:1fr}}
  .status{position:fixed;left:0;right:0;bottom:0;background:var(--tus);color:var(--hartie);
    font-size:12px;padding:8px 16px;text-align:center;transform:translateY(100%);transition:transform .25s}
  .status.on{transform:none}
</style>
<div id="app"><div class="wrap" id="root"></div></div>
<div class="status" id="status"></div>

/* ==================== SFÂRȘITUL ZONEI DE EDITAT ==================== */

const $=s=>document.querySelector(s);
const K=32,BASE=1500;
const ARTIFACT = typeof window.storage!=="undefined";
let S={me:"",oras:"Tokyo",tab:"pref",pair:null,loading:true,
       date:{prefs:{},dueluri:[],alegeri:{}},toti:{},organizator:false};

function status(t,ms=2200){const el=$("#status");el.textContent=t;el.classList.add("on");
  clearTimeout(status._t);status._t=setTimeout(()=>el.classList.remove("on"),ms);}

/* ---------- salvare / citire ---------- */
function citesteDeLaSheet(){
  return new Promise(res=>{
    if(!URL_SCRIPT) return res(null);
    const cb="cb"+Date.now();
    window[cb]=d=>{res(d);delete window[cb];sc.remove()};
    const sc=document.createElement("script");
    sc.src=URL_SCRIPT+"?callback="+cb;
    sc.onerror=()=>{res(null);sc.remove()};
    document.head.appendChild(sc);
    setTimeout(()=>{if(window[cb]){res(null);delete window[cb]}},8000);
  });
}
async function salveaza(){
  S.toti[S.me]=S.date;
  if(URL_SCRIPT){
    try{
      await fetch(URL_SCRIPT,{method:"POST",mode:"no-cors",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify({nume:S.me,date:S.date})});
      status("Salvat ✓");
    }catch(e){status("Nu am reușit să salvez — verifică internetul")}
  }else if(ARTIFACT){
    try{await window.storage.set("jp:r:"+S.me,JSON.stringify(S.date),true)}catch(e){}
  }
  try{localStorage.setItem("jp:"+S.me,JSON.stringify(S.date))}catch(e){}
}
async function load(){
  const d=await citesteDeLaSheet();
  if(d) S.toti=d;
  else if(ARTIFACT){
    try{const l=await window.storage.list("jp:r:",true);
      for(const k of (l?.keys||[])){const v=await window.storage.get(k,true);
        S.toti[k.replace("jp:r:","")]=JSON.parse(v.value);}}catch(e){}
  }
  S.loading=false;render();
}

/* ---------- elo ---------- */
function elo(dueluri,oras){
  const ids=CARDURI.filter(c=>c.oras===oras).map(c=>c.id);
  const r={},n={};ids.forEach(i=>{r[i]=BASE;n[i]=0});
  (dueluri||[]).filter(d=>d.o===oras).forEach(d=>{
    if(r[d.w]===undefined||r[d.l]===undefined)return;
    const e=1/(1+Math.pow(10,(r[d.l]-r[d.w])/400));
    r[d.w]+=K*(1-e);r[d.l]-=K*(1-e);n[d.w]++;n[d.l]++;
  });
  return{r,n,ids};
}
function urmatoareaPereche(oras){
  const{r,n,ids}=elo(S.date.dueluri,oras);
  if(ids.length<2)return null;
  const vazute=new Set((S.date.dueluri||[]).filter(d=>d.o===oras).map(d=>[d.w,d.l].sort().join("|")));
  const tinta=Math.max(4,Math.ceil(Math.log2(ids.length))+2);
  const pool=ids.filter(i=>n[i]<tinta);
  if(!pool.length)return null;
  const a=pool.sort((x,y)=>n[x]-n[y]||Math.random()-.5)[0];
  const c=ids.filter(i=>i!==a&&!vazute.has([a,i].sort().join("|")));
  if(!c.length)return null;
  c.sort((x,y)=>Math.abs(r[x]-r[a])-Math.abs(r[y]-r[a]));
  const b=c[Math.floor(Math.random()*Math.min(3,c.length))];
  return Math.random()<.5?[a,b]:[b,a];
}
const card=id=>CARDURI.find(c=>c.id===id);
const esc=s=>(s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const fundal=c=>c.img?`style="background-image:url('${esc(c.img)}');background-position:${esc(c.poz||"center")}"`:`style="background:linear-gradient(150deg,#EFE4D2,#E4D3BC)"`;

    $("#nm").onkeydown=e=>{if(e.key==="Enter")$("#go").click()};
    $("#org").onclick=()=>{S.me="Organizator";S.organizator=true;S.tab="rez";
      S.date=S.toti["Organizator"]||{prefs:{},dueluri:[],alegeri:{}};render()};
    return;
  }
  const taburi=[["pref","1 · Preferințe"],["duel","2 · Dueluri"],["aleg","3 · Alegeri"],["rez","Rezultate"],["ed","Carduri"]];
  root.innerHTML=antet()+
   `<p class="sub">${esc(S.me)} · ${Object.keys(S.date.prefs).length}/${PREFERINTE.length} preferințe · ${S.date.dueluri.length} dueluri · ${Object.keys(S.date.alegeri).length}/${ALEGERI.length} alegeri</p>
   <div class="tabs">${taburi.map(t=>`<button class="tab ${S.tab===t[0]?"active":""}" data-t="${t[0]}">${t[1]}</button>`).join("")}</div>
   <div id="view"></div>`;
  root.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;S.pair=null;render()});
  ({pref:vPref,duel:vDuel,aleg:vAleg,rez:vRez,ed:vEd})[S.tab]();

function vRez(){
  const oameni=Object.keys(S.toti).length?Object.keys(S.toti):[S.me];
  const v=$("#view");
  const medii=PREFERINTE.map(p=>{
    const note=oameni.map(o=>S.toti[o]?.prefs?.[p.id]).filter(x=>x>0);
    const m=note.length?note.reduce((a,b)=>a+b,0)/note.length:0;
    const sd=note.length>1?Math.sqrt(note.reduce((s,x)=>s+(x-m)**2,0)/note.length):0;
    return{p,m,sd};
  }).sort((a,b)=>b.m-a.m);
  const ids=CARDURI.filter(c=>c.oras===S.oras).map(c=>c.id);
  const sum={},sp={};ids.forEach(i=>{sum[i]=0;sp[i]=[]});
  oameni.forEach(o=>{const{r}=elo(S.toti[o]?.dueluri||[],S.oras);ids.forEach(i=>{sum[i]+=r[i];sp[i].push(r[i])})});
  const ord=ids.slice().sort((a,b)=>sum[b]-sum[a]);
  const dev=i=>{const m=sum[i]/oameni.length;return Math.sqrt(sp[i].reduce((s,x)=>s+(x-m)**2,0)/sp[i].length)};
  const maxd=Math.max(1,...ids.map(dev));
  v.innerHTML=`<div class="row" style="margin-bottom:12px"><button id="reload">🔄 Reîncarcă răspunsurile</button></div>
    <div class="panel"><div class="meta">Preferințe generale — media grupului (${oameni.length} persoane)</div>

      <div class="bar"><i style="width:${x.m*10}%"></i></div></div>
      <span class="small">${x.sd>2.5?"⚡ păreri împărțite":x.sd<1.2?"✓ consens":"~ mixt"}</span></div>`).join("")}</div>`
  + baraOrase() +
  `<div class="panel"><div class="meta">Clasamentul grupului — ${esc(S.oras)}</div>
    ${ord.map((id,i)=>{const c=card(id);const d=dev(id);
      return `<div class="rank"><span class="num">${String(i+1).padStart(2,"0")}</span>
      <div style="flex:1"><div>${c.img?"":c.emoji} ${esc(c.titlu)}</div>
      <div class="small">${d>maxd*.6?"⚡ păreri împărțite":d<maxd*.25?"✓ consens":"~ mixt"}</div></div></div>`}).join("")}</div>
  <div class="panel"><div class="meta">Alegeri organizatorice</div>
    ${ALEGERI.map(q=>{const nr=q.optiuni.map((_,i)=>oameni.filter(o=>S.toti[o]?.alegeri?.[q.id]===i).length);
      const tot=nr.reduce((a,b)=>a+b,0)||1;
      return `<div style="padding:10px 0;border-bottom:1px solid var(--linie)">
        <div style="font-size:14px;margin-bottom:6px">${esc(q.intrebare)}</div>

          <span class="small" style="min-width:190px">${esc(o.titlu)}</span>
          <div class="bar" style="flex:1;margin:0"><i style="width:${nr[i]/tot*100}%"></i></div>
          <span class="small">${nr[i]}</span></div>`).join("")}</div>`}).join("")}</div>
  <div class="panel"><div class="meta">Cine a răspuns</div>
    ${oameni.map(o=>`<span class="pill">${esc(o)}</span>`).join("")}</div>`;
  legOrase();
  $("#reload").onclick=async()=>{status("Se încarcă…");const d=await citesteDeLaSheet();if(d)S.toti=d;render();};

  v.querySelectorAll(".ed").forEach(box=>{
    const c=card(box.dataset.id);
    box.querySelector('[data-act="save"]').onclick=()=>{
      box.querySelectorAll("[data-f]").forEach(f=>c[f.dataset.f]=f.value.trim());
      status("Card actualizat — nu uita să exporți");render();
    };
    box.querySelector('[data-act="del"]').onclick=()=>{
      if(!confirm("Ștergi cardul?"))return;
      CARDURI=CARDURI.filter(x=>x.id!==c.id);render();
    };
  });
  $("#nou").onclick=()=>{CARDURI.push({id:"n"+Date.now(),oras:S.oras,titlu:"Titlu nou",emoji:"📍",img:"",desc:"",dece:""});render()};
  $("#exp").onclick=()=>{
    const b=new Blob([JSON.stringify({PREFERINTE,CARDURI,ALEGERI},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="japonia-continut.json";a.click();
  };
  $("#imp").onclick=()=>{
    const i=document.createElement("input");i.type="file";i.accept=".json";
    i.onchange=async()=>{try{const d=JSON.parse(await i.files[0].text());
      if(d.PREFERINTE)PREFERINTE=d.PREFERINTE;if(d.CARDURI)CARDURI=d.CARDURI;if(d.ALEGERI)ALEGERI=d.ALEGERI;render();
      }catch(e){alert("Fișier invalid.")}};
    i.click();
  };
}
load();
</script>
